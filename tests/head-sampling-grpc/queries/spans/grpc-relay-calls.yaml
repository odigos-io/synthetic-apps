apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  Spans on grpc-relay after grpc-relay-calls job (20 Relay RPCs).
  Each Relay call produces inbound Relay, outbound Unary client, and inbound Unary server spans.
  Rule IDs match nodejs/grpc/deployments/grpc-relay/sampling.yaml.
serviceName: grpc-relay
resourceAttributes:
  odigos.workload.kind: Deployment
  odigos.workload.name: grpc-relay
  k8s.deployment.name: grpc-relay
  k8s.namespace.name: nodejs-grpc
x-absent-tail-sampling-attrs: &absent_tail_sampling_attrs
  odigos.sampling.span.matching_rule.id: ""
  odigos.sampling.span.matching_rule.name: ""
  odigos.sampling.span.matching_rule.keep_percentage: ""
  odigos.sampling.trace.deciding_rule.name: ""
spans:
  - id: relay-inbound-server
    description: Relay x20 — grpc-relay-inbound (50% noise rule)
    samplingDecision: |
      grpc-relay-inbound matches inbound Relay on synthetic.SyntheticService (percentageAtMost 50%).
    kind: server
    spanAttributes:
      rpc.system: grpc
      rpc.service: synthetic.SyntheticService
      rpc.method: Relay
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 167fb9f72360c8ef
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20

  - id: relay-outbound-unary-client
    description: Relay handler outbound Unary to 127.0.0.1 — grpc-relay-outbound-unary (50%)
    samplingDecision: |
      grpc-relay-outbound-unary matches outbound Unary client to 127.0.0.1 (percentageAtMost 50%).
    kind: client
    spanAttributes:
      rpc.system: grpc
      rpc.service: synthetic.SyntheticService
      rpc.method: Unary
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 167fb9f72360c8ef
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20

  - id: relay-inbound-unary-server
    description: Unary on self after Relay outbound — grpc-relay-inbound-unary (50%)
    samplingDecision: |
      grpc-relay-inbound-unary matches inbound Unary on synthetic.SyntheticService (percentageAtMost 50%).
    kind: server
    spanAttributes:
      rpc.system: grpc
      rpc.service: synthetic.SyntheticService
      rpc.method: Unary
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 167fb9f72360c8ef
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20
