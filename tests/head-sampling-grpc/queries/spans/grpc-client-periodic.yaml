apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  Outbound gRPC client spans from grpc-client periodic loop
  (nodejs/grpc/deployments/grpc-client/k8s.yaml, GRPC_CLIENT_INTERVAL_MS=10000).
  Each tick emits Unary, StreamNumbers, ClientStreamSum, and BidiEcho client spans.
  Counts are timing-dependent; assert minimum coverage and sampling attrs.
  Rule IDs match nodejs/grpc/deployments/grpc-client/sampling.yaml.
serviceName: grpc-client
resourceAttributes:
  odigos.workload.kind: Deployment
  odigos.workload.name: grpc-client
  k8s.deployment.name: grpc-client
  k8s.namespace.name: nodejs-grpc
x-absent-tail-sampling-attrs: &absent_tail_sampling_attrs
  odigos.sampling.span.matching_rule.id: ""
  odigos.sampling.span.matching_rule.name: ""
  odigos.sampling.span.matching_rule.keep_percentage: ""
  odigos.sampling.trace.deciding_rule.name: ""
spans:
  - id: unary-client
    description: periodic outbound Unary to grpc-server — grpc-client-unary (50% noise rule)
    samplingDecision: |
      grpc-client-unary matches outbound Unary to grpc-server (percentageAtMost 50%).
    kind: client
    spanAttributes:
      rpc.system: grpc
      rpc.service: synthetic.SyntheticService
      rpc.method: Unary
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: bbfcfd562781700b
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      minimum: 1

  - id: stream-numbers-client
    description: periodic outbound StreamNumbers — grpc-client-stream-numbers (50%)
    samplingDecision: |
      grpc-client-stream-numbers matches outbound server-streaming StreamNumbers (percentageAtMost 50%).
    kind: client
    spanAttributes:
      rpc.system: grpc
      rpc.service: synthetic.SyntheticService
      rpc.method: StreamNumbers
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 4d1d2ffe6ec1db2e
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      minimum: 1

  - id: client-stream-sum-client
    description: periodic outbound ClientStreamSum — grpc-client-stream-sum (10%)
    samplingDecision: |
      grpc-client-stream-sum matches outbound client-streaming ClientStreamSum (percentageAtMost 10%).
    kind: client
    spanAttributes:
      rpc.system: grpc
      rpc.service: synthetic.SyntheticService
      rpc.method: ClientStreamSum
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 07aa53fe11dbedae
      odigos.sampling.trace.deciding_rule.keep_percentage: 10
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      minimum: 1

  - id: bidi-echo-client
    description: periodic outbound BidiEcho — grpc-client-bidi-echo (10%)
    samplingDecision: |
      grpc-client-bidi-echo matches outbound bidirectional BidiEcho (percentageAtMost 10%).
    kind: client
    spanAttributes:
      rpc.system: grpc
      rpc.service: synthetic.SyntheticService
      rpc.method: BidiEcho
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 8105eee1b4b481a7
      odigos.sampling.trace.deciding_rule.keep_percentage: 10
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      minimum: 1
