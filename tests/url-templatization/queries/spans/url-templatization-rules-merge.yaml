apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  Spans from url-templatization-rules-merge deployment (merged custom rules).
serviceName: url-templatization-rules-merge
resourceAttributes:
  odigos.workload.kind: Deployment
  odigos.workload.name: url-templatization-rules-merge
  k8s.deployment.name: url-templatization-rules-merge
  k8s.namespace.name: nodejs-url-templatization
spans:
  - id: plain-http-default
    description: GET /plain-http/default (curl job route index)
    kind: server
    spanAttributes:
      http.route: /plain-http/default
      http.status_code: 200
    expected:
      minimum: 1
