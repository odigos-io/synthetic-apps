apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tail-sampling
spec:
  description: |
    E2E tests for Odigos tail sampling.
    Prerequisites: a kind cluster with Odigos already installed at the version under test.
    Configure the language under test via --values (e.g. make test-tail-sampling LANGUAGE=nodejs).
  skipDelete: true
  bindings:
    - name: tests_namespace
      value: (join('-', [$values.language, 'tail-sampling']))
    - name: trace_namespace
      value: ($tests_namespace)
  steps:
  
    - name: Create Tests Namespace
      try:
        - script:
            env:
              - name: TESTS_NAMESPACE
                value: ($tests_namespace)
            content: |
              kubectl create namespace "$TESTS_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

    - name: Enable sampling dry run
      try:
        - apply:
            file: ./apply/odigos-sampling-dry-run-config.yaml

    - name: Install Simple Trace Db
      try:
        - script:
            timeout: 2m
            env:
              - name: TRACE_NAMESPACE
                value: ($tests_namespace)
            content: |
              #!/bin/bash
              set -euo pipefail
              already_running=false
              if kubectl get deployment simple-trace-db -n "$TRACE_NAMESPACE" >/dev/null 2>&1; then
                already_running=true
              fi
              sed 's/($trace_namespace)/'"$TRACE_NAMESPACE"'/g' ../common/apply/simple-trace-db-deployment.yaml | kubectl apply -f -
              if [[ "$already_running" == "true" ]]; then
                kubectl rollout restart deployment/simple-trace-db -n "$TRACE_NAMESPACE"
              fi

    - name: Add Destination
      try:
        - apply:
            template: true
            resource:
              apiVersion: odigos.io/v1alpha1
              kind: Destination
              metadata:
                name: (join('-', ['simple-trace-db', $values.language, 'tail-sampling']))
                namespace: odigos-system
              spec:
                data:
                  OTLP_HTTP_ENDPOINT: (join('', ['http://simple-trace-db.', $trace_namespace, ':4318']))
                destinationName: e2e-tests
                signals:
                  - TRACES
                type: otlphttp
                sourceSelector:
                  dataStreams:
                    - ($tests_namespace)

    - name: deploy test application
      try:
        - script:
            timeout: 1m
            env:
              - name: LANGUAGE
                value: ($values.language)
            content: |
              #!/bin/bash
              set -euo pipefail

              repo_root="$(cd ../.. && pwd)"
              app_dir="${repo_root}/${LANGUAGE}/tail-sampling"
              if [ ! -d "${app_dir}" ]; then
                echo "unknown language: ${LANGUAGE} (expected ${app_dir})"
                exit 1
              fi

              kubectl get namespace odigos-system >/dev/null
              echo "deploying tail-sampling app from ${app_dir}"
              cd "${app_dir}"
              make deploy

    - name: apply data streams to sources
      try:
        - script:
            env:
              - name: TESTS_NAMESPACE
                value: ($tests_namespace)
            content: |
              ../common/apply/apply-data-stream-to-sources.sh

    - name: assert workload collector sampling config
      try:
        - assert:
            timeout: 30s
            file: ./assert/workload-collector-config.yaml
      catch:
        - script:
            env:
              - name: LANGUAGE
                value: ($values.language)
            content: |
              kubectl get instrumentationconfig -n "${LANGUAGE}-tail-sampling" -o yaml
              kubectl get sampling -n odigos-system -o yaml

    - name: wait for pods to be instrumented
      try:
        - script:
            timeout: 5m
            env:
              - name: LANGUAGE
                value: ($values.language)
            content: |
              export NAMESPACE="${LANGUAGE}-tail-sampling"
              ../common/assert/wait-for-pods-instrumented.sh
      catch:
        - script:
            env:
              - name: LANGUAGE
                value: ($values.language)
            content: |
              kubectl get pods -n "${LANGUAGE}-tail-sampling" -o yaml

    - name: wait for simple trace db
      try:
        - script:
            timeout: 2m
            env:
              - name: TRACE_NAMESPACE
                value: ($tests_namespace)
            content: |
              #!/bin/bash
              set -euo pipefail
              kubectl wait --for=condition=available deployment/simple-trace-db -n "$TRACE_NAMESPACE" --timeout=120s

    - name: record sampling trace metrics baseline
      try:
        - script:
            timeout: 3m
            content: |
              #!/bin/bash
              set -euo pipefail
              ../common/assert/victoriametrics_sampling_metrics_runner.sh record-baseline \
                ./queries/metrics/trace-sampling-metrics.yaml \
                ./.trace-sampling-metrics-baseline.json

    - name: trigger traffic
      try:
        - script:
            timeout: 3m
            env:
              - name: LANGUAGE
                value: ($values.language)
            content: |
              #!/bin/bash
              set -euo pipefail

              repo_root="$(cd ../.. && pwd)"
              app_dir="${repo_root}/${LANGUAGE}/tail-sampling"
              cd "${app_dir}"
              make trigger

    - name: Assert expected spans
      try:
        - script:
            timeout: 2m
            env:
              - name: TRACE_NAMESPACE
                value: ($trace_namespace)
            content: |
              #!/bin/bash
              set -euo pipefail
              deadline=$(($(date +%s) + 120))
              while true; do
                if ../common/assert/simple_trace_db_span_query_runner.sh --dir ./queries/spans "$TRACE_NAMESPACE" simple-trace-db; then
                  exit 0
                fi
                if [[ $(date +%s) -ge deadline ]]; then
                  echo "span assertions did not pass within 2m" >&2
                  exit 1
                fi
                sleep 2
              done
      catch:
        - script:
            env:
              - name: TRACE_NAMESPACE
                value: ($trace_namespace)
            content: |
              ../common/assert/simple_trace_db_span_query_runner.sh --dir ./queries/spans --verbose "$TRACE_NAMESPACE" simple-trace-db

    - name: Assert sampling trace metrics
      try:
        - script:
            timeout: 2m
            content: |
              #!/bin/bash
              set -euo pipefail
              deadline=$(($(date +%s) + 120))
              while true; do
                if ../common/assert/victoriametrics_sampling_metrics_runner.sh assert-delta \
                  ./queries/metrics/trace-sampling-metrics.yaml \
                  ./.trace-sampling-metrics-baseline.json; then
                  exit 0
                fi
                if [[ $(date +%s) -ge deadline ]]; then
                  echo "sampling trace metrics did not match within 2m" >&2
                  exit 1
                fi
                sleep 2
              done
      catch:
        - script:
            content: |
              #!/bin/bash
              set -euo pipefail
              ../common/assert/victoriametrics_sampling_metrics_runner.sh assert-delta \
                ./queries/metrics/trace-sampling-metrics.yaml \
                ./.trace-sampling-metrics-baseline.json || true
              echo "--- current totals by rule id (match / keep / drop) ---"
              base="http://odigos-victoriametrics.odigos-system.svc.cluster.local:8428"
              for id in 2776299379c7199c 9d82dd7a5149133d e47b0852274a5645 8095630644768ad9 c2a21b6d3fed0463; do
                for m in match_count_total keep_count_total drop_count_total; do
                  q="sum(otelcol_odigos.sampling.trace.${m}{odigos.sampling.rule.id=\"${id}\"})"
                  echo "${id} ${m}:"
                  kubectl run "vm-debug-$RANDOM" --rm -i --restart=Never -n odigos-system \
                    --image=curlimages/curl:8.4.0 --command -- \
                    curl -sG "${base}/api/v1/query" --data-urlencode "query=${q}" 2>/dev/null | sed 's/pod ".*$//' || true
                  echo ""
                done
              done
