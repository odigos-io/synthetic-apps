apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  Spans exported after tail-sampling-errors-curls job
  (nodejs/tail-sampling/deployments/errors/curl-job.yaml).
  Sampling attrs recorded with dryRun enabled (see odigos-sampling-dry-run-config.yaml).
  Rule names match deployments/*/sampling.yaml / workload-collector-config assert.
serviceName: tail-sampling-errors
resourceAttributesEndsWith:
  k8s.namespace.name: "-tail-sampling"
resourceAttributes:
  odigos.workload.kind: Deployment
  odigos.workload.name: tail-sampling-errors
  k8s.deployment.name: tail-sampling-errors
# Keys listed in spanAttributesAbsent must be missing on the matched span (values ignored).
x-absent-odigos-sampling: &absent_odigos_sampling
  odigos.sampling.category: ""
  odigos.sampling.dry_run: ""
  odigos.sampling.span.matching_rule.id: ""
  odigos.sampling.span.matching_rule.name: ""
  odigos.sampling.span.matching_rule.keep_percentage: ""
  odigos.sampling.trace.deciding_rule.id: ""
  odigos.sampling.trace.deciding_rule.keep_percentage: ""
  odigos.sampling.trace.deciding_rule.name: ""
  odigos.sampling.trace.kept: ""
x-absent-span-matching-rule: &absent_span_matching_rule
  odigos.sampling.span.matching_rule.id: ""
  odigos.sampling.span.matching_rule.name: ""
  odigos.sampling.span.matching_rule.keep_percentage: ""
spans:
  - id: healthz
    description: call_ok /healthz (no odigos.sampling.* on server span)
    samplingDecision: |
      No sampling rule applies. /healthz is not route /ok (cost-reduction-ok-baseline) and the
      request succeeds (high-relevance-error requires error: true). With only those two rules
      defined for this workload, the server span is exported without odigos.sampling.* attrs.
    kind: server
    spanAttributes:
      http.route: /healthz
      http.status_code: 200
    spanAttributesAbsent: *absent_odigos_sampling
    expected:
      count: 1

  - id: ok-baseline
    description: call_many_ok 30 /ok — cost-reduction-ok-baseline (10%); do not assert trace.kept (varies under dry run)
    samplingDecision: |
      cost-reduction-ok-baseline matches (httpServer route=/ok, percentageAtMost 10%). Span and
      trace deciding rule are that cost-reduction rule (category cost reduction). dry_run is on;
      odigos.sampling.trace.kept may be present (true/false) and is not asserted here.
    kind: server
    spanAttributes:
      http.route: /ok
      http.status_code: 200
      odigos.sampling.category: 'cost reduction'
      odigos.sampling.dry_run: true
      odigos.sampling.span.matching_rule.name: cost-reduction-ok-baseline
      odigos.sampling.span.matching_rule.keep_percentage: 10
      odigos.sampling.trace.deciding_rule.keep_percentage: 10
      odigos.sampling.trace.deciding_rule.name: cost-reduction-ok-baseline
    expected:
      count: 30

  - id: error-always
    description: call_err /error — high-relevance-error (100%)
    samplingDecision: |
      high-relevance-error matches (error: true, percentageAtLeast 100%). Span matching rule and
      trace deciding rule are high-relevance-error; trace.kept is true (always keep error traces).
    kind: server
    spanAttributes:
      http.route: /error
      http.status_code: 500
      odigos.sampling.category: 'highly relevant'
      odigos.sampling.dry_run: true
      odigos.sampling.span.matching_rule.name: high-relevance-error
      odigos.sampling.span.matching_rule.keep_percentage: 100
      odigos.sampling.trace.deciding_rule.keep_percentage: 100
      odigos.sampling.trace.deciding_rule.name: high-relevance-error
      odigos.sampling.trace.kept: true
    spanStatusError: true
    expected:
      count: 1

  - id: alternate-ok
    description: call_ok /alternate first call HTTP 200 (no odigos.sampling.* on server span)
    samplingDecision: |
      No sampling rule applies on this successful /alternate server span. cost-reduction-ok-baseline
      only matches route /ok, not /alternate. high-relevance-error does not apply without error.
      Exported without odigos.sampling.* attrs (same as /healthz).
    kind: server
    spanAttributes:
      http.route: /alternate
      http.status_code: 200
    spanAttributesAbsent: *absent_odigos_sampling
    expected:
      count: 1

  - id: alternate-error
    description: call_err /alternate second call HTTP 500 — high-relevance-error (100%)
    samplingDecision: |
      high-relevance-error matches on the failing /alternate request (error: true, 100% keep).
      Route does not matter for the error rule—only span/trace error status. trace.kept is true.
    kind: server
    spanAttributes:
      http.route: /alternate
      http.status_code: 500
      odigos.sampling.category: 'highly relevant'
      odigos.sampling.dry_run: true
      odigos.sampling.span.matching_rule.name: high-relevance-error
      odigos.sampling.span.matching_rule.keep_percentage: 100
      odigos.sampling.trace.deciding_rule.keep_percentage: 100
      odigos.sampling.trace.deciding_rule.name: high-relevance-error
      odigos.sampling.trace.kept: true
    spanStatusError: true
    expected:
      count: 1

  - id: hops-client-ok
    description: call_ok /hops?hops=3 — client server span; trace decided by high-relevance-error (internal hop is 500)
    samplingDecision: |
      Outermost /hops server span is HTTP 200, so cost-reduction-ok-baseline does not apply and
      this span is not the error operation. The trace still contains internal server spans with
      error status; trace deciding rule is high-relevance-error (100%, trace.kept true). Only
      trace-level odigos.sampling.* attrs are expected on this span, not span.matching_rule.*.
    kind: server
    spanAttributes:
      http.route: /hops
      http.status_code: 200
      odigos.sampling.category: 'highly relevant'
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.keep_percentage: 100
      odigos.sampling.trace.deciding_rule.name: high-relevance-error
      odigos.sampling.trace.kept: true
    spanAttributesContains:
      http.target: hops=3
    spanAttributesAbsent: *absent_span_matching_rule
    expected:
      count: 1
