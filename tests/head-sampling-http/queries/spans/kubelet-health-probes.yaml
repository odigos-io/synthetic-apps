apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  Kubelet probe server spans on kubelet-health-probes Deployment
  (<language>/head-sampling/deployments/kubelet-health-probes/k8s.yaml).
  Requires k8sHealthProbesSampling.enabled in odigos-sampling-dry-run-config.yaml.
  Liveness and readiness probes run continuously; startup probes run during pod boot
  (and on rollout restarts during the test). Counts are timing-dependent.
  SIMULATE_STARTUP_DELAY=true: /healthz/startup may return 503 until ~10s after process start.
serviceName: kubelet-health-probes
resourceAttributesEndsWith:
  k8s.namespace.name: "-head-sampling"
resourceAttributes:
  odigos.workload.kind: Deployment
  odigos.workload.name: kubelet-health-probes
  k8s.deployment.name: kubelet-health-probes
x-absent-tail-sampling-attrs: &absent_tail_sampling_attrs
  odigos.sampling.span.matching_rule.id: ""
  odigos.sampling.span.matching_rule.name: ""
  odigos.sampling.span.matching_rule.keep_percentage: ""
  odigos.sampling.trace.deciding_rule.name: ""
spans:
  - id: liveness-probe
    description: kubelet liveness probe GET /healthz/live — k8s health probe sampling (0% keep)
    samplingDecision: |
      k8sHealthProbesSampling matches liveness probe path /healthz/live (0% keep, noise category).
    kind: server
    spanAttributes:
      http.route: /healthz/live
      http.status_code: 200
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 364ef2a5651dc1a2
      odigos.sampling.trace.deciding_rule.keep_percentage: 0
      odigos.sampling.trace.kept: false
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      minimum: 1

  - id: readiness-probe
    description: kubelet readiness probe GET /healthz/ready — k8s health probe sampling (0% keep)
    samplingDecision: |
      k8sHealthProbesSampling matches readiness probe path /healthz/ready (0% keep, noise category).
    kind: server
    spanAttributes:
      http.route: /healthz/ready
      http.status_code: 200
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: 28c677bf93f1a46a
      odigos.sampling.trace.deciding_rule.keep_percentage: 0
      odigos.sampling.trace.kept: false
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      minimum: 1

  - id: startup-probe
    description: kubelet startup probe GET /healthz/startup — k8s health probe sampling (0% keep)
    samplingDecision: |
      k8sHealthProbesSampling matches startup probe path /healthz/startup (0% keep, noise category).
      With SIMULATE_STARTUP_DELAY=true, status may be 503 until the simulated delay elapses.
    kind: server
    spanAttributes:
      http.route: /healthz/startup
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.id: f14ba7a66f1594e0
      odigos.sampling.trace.deciding_rule.keep_percentage: 0
      odigos.sampling.trace.kept: false
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      minimum: 1
