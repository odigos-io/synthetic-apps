# One-off Job: curls tail-sampling-errors endpoints for error tail-sampling tests.
# Trigger with: make trigger (from python/tail-sampling)
apiVersion: batch/v1
kind: Job
metadata:
  name: tail-sampling-errors-curls
  labels:
    odigos.io/test-infra: "true"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: tail-sampling-errors-curls
        odigos.io/test-infra: "true"
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
      containers:
        - name: curl
          image: curlimages/curl:8.4.0
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              BASE_URL="http://${TAIL_SAMPLING_ERRORS_SERVICE_HOST}:${TAIL_SAMPLING_ERRORS_SERVICE_PORT}"
              echo "BASE_URL=${BASE_URL}"

              call_ok() {
                curl -sS -f -o /dev/null "${BASE_URL}$1"
              }
              call_err() {
                code=$(curl -sS -o /dev/null -w "%{http_code}" "${BASE_URL}$1")
                if [ "$code" != "500" ]; then
                  echo "expected HTTP 500 for $1 got $code" >&2
                  exit 1
                fi
              }
              call_many_ok() {
                count=$1
                path=$2
                i=1
                while [ "$i" -le "$count" ]; do
                  curl -sS -f -o /dev/null "${BASE_URL}${path}"
                  i=$((i + 1))
                done
              }

              call_ok "/healthz"
              call_many_ok 30 "/ok"
              call_err "/error"
              call_ok "/alternate"
              call_err "/alternate"
              call_ok "/hops?hops=3"
              echo "all curls succeeded"
