kind: Deployment
apiVersion: apps/v1
metadata:
  name: tail-sampling-errors
  labels:
    app: tail-sampling-errors
spec:
  selector:
    matchLabels:
      app: tail-sampling-errors
  template:
    metadata:
      labels:
        app: tail-sampling-errors
    spec:
      containers:
        - name: tail-sampling-errors
          image: p0xd21zf5r.registry.depot.dev/synthetic-apps:python-tail-sampling
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
kind: Service
apiVersion: v1
metadata:
  name: tail-sampling-errors
spec:
  selector:
    app: tail-sampling-errors
  ports:
    - protocol: TCP
      port: 8080
