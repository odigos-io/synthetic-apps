name: Build Depot Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'nodejs/head-sampling/**'
      - 'nodejs/grpc/**'
      - 'nodejs/tail-sampling/**'
      - 'python/head-sampling/**'
      - 'python/tail-sampling/**'
      - '.github/workflows/build-depot-images.yml'

permissions:
  contents: read
  id-token: write

env:
  DEPOT_REGISTRY: 'p0xd21zf5r.registry.depot.dev'

jobs:
  build-and-push:
    runs-on: depot-ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: depot/setup-action@v1
      - name: Login to Depot Registry
        run: docker login --username x-token --password ${{ secrets.DEPOT_SYNTHTIC_APPS_PUSH_TOKEN }} ${DEPOT_REGISTRY}

      - name: Build and push nodejs-head-sampling-http
        uses: depot/build-push-action@v1
        with:
          project: ddgftn5pcl
          push: true
          platforms: linux/amd64,linux/arm64
          file: nodejs/head-sampling/deployments/head-sampling/Dockerfile
          context: nodejs/head-sampling
          tags: ${{ env.DEPOT_REGISTRY }}/synthetic-apps:nodejs-head-sampling-http

      - name: Build and push python-head-sampling-http
        uses: depot/build-push-action@v1
        with:
          project: ddgftn5pcl
          push: true
          platforms: linux/amd64,linux/arm64
          file: python/head-sampling/deployments/head-sampling/Dockerfile
          context: python/head-sampling
          tags: ${{ env.DEPOT_REGISTRY }}/synthetic-apps:python-head-sampling-http

      - name: Build and push nodejs-grpc
        uses: depot/build-push-action@v1
        with:
          project: ddgftn5pcl
          push: true
          platforms: linux/amd64,linux/arm64
          file: nodejs/grpc/deployments/grpc/Dockerfile
          context: nodejs/grpc
          tags: ${{ env.DEPOT_REGISTRY }}/synthetic-apps:nodejs-grpc

      - name: Build and push nodejs-tail-sampling
        uses: depot/build-push-action@v1
        with:
          project: ddgftn5pcl
          push: true
          platforms: linux/amd64,linux/arm64
          file: nodejs/tail-sampling/deployments/tail-sampling/Dockerfile
          context: nodejs/tail-sampling
          tags: ${{ env.DEPOT_REGISTRY }}/synthetic-apps:nodejs-tail-sampling

      - name: Build and push python-tail-sampling
        uses: depot/build-push-action@v1
        with:
          project: ddgftn5pcl
          push: true
          platforms: linux/amd64,linux/arm64
          file: python/tail-sampling/deployments/tail-sampling/Dockerfile
          context: python/tail-sampling
          tags: ${{ env.DEPOT_REGISTRY }}/synthetic-apps:python-tail-sampling
