name: Odigos Scenario E2E (All)

on:
  workflow_dispatch:
    inputs:
      odigos_version:
        description: 'Odigos version to install (e.g. v1.29.2 or 1.30.0-pre2 or 1.31.0-rc1)'
        required: true
        type: string

env:
  DEPOT_REGISTRY: p0xd21zf5r.registry.depot.dev

jobs:
  scenario-e2e:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          #### Tail Sampling ####
          - scenario: tail-sampling
            tier: oss
            language: nodejs
            otel_distro_name: 'nodejs-community'
          - scenario: tail-sampling
            tier: oss
            language: python
            otel_distro_name: 'python-community'
          - scenario: tail-sampling
            tier: oss
            language: java
            otel_distro_name: 'java-community'
          - scenario: tail-sampling
            tier: enterprise
            language: nodejs
            otel_distro_name: 'nodejs-enterprise'
          - scenario: tail-sampling
            tier: enterprise
            language: python
            otel_distro_name: 'python-enterprise'
          - scenario: tail-sampling
            tier: enterprise
            language: java
            otel_distro_name: java-enterprise

          #### Head Sampling HTTP ####
          - scenario: head-sampling-http
            tier: oss
            language: nodejs
            otel_distro_name: 'nodejs-community'
          - scenario: head-sampling-http
            tier: enterprise
            language: nodejs
            otel_distro_name: 'nodejs-enterprise'
          # - scenario: head-sampling-http
          #   tier: oss
          #   language: python
          #   otel_distro_name: 'python-community'
          # - scenario: head-sampling-http
          #   tier: enterprise
          #   language: python
          #   otel_distro_name: 'python-enterprise'
          - scenario: head-sampling-http
            tier: enterprise
            language: java
            otel_distro_name: 'java-enterprise'

          #### Head Sampling gRPC ####
          - scenario: head-sampling-grpc
            tier: oss
            language: nodejs
            otel_distro_name: 'nodejs-community'
          - scenario: head-sampling-grpc
            tier: enterprise
            language: nodejs
            otel_distro_name: 'nodejs-enterprise'

          #### Runtime Versions ####
          - scenario: runtime-versions
            tier: oss
            language: nodejs
            otel_distro_name: 'nodejs-community'
          - scenario: runtime-versions
            tier: oss
            language: python
          # - scenario: runtime-versions
          #   tier: oss
          #   language: java
          #   otel_distro_name: 'java-community'
          # - scenario: runtime-versions
          #   tier: oss
          #   language: golang
          #   otel_distro_name: 'golang-community'
          # - scenario: runtime-versions
          #   tier: enterprise
          #   language: nodejs
          #   otel_distro_name: 'nodejs-enterprise'
          - scenario: runtime-versions
            tier: enterprise
            language: python
          # - scenario: runtime-versions
          #   tier: enterprise
          #   language: java
          #   otel_distro_name: 'java-enterprise'
          # - scenario: runtime-versions
          #   tier: enterprise
          #   language: golang
          #   otel_distro_name: 'golang-enterprise'
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/odigos-scenario-e2e
        with:
          odigos_version: ${{ inputs.odigos_version }}
          scenario: ${{ matrix.scenario }}
          languages: ${{ matrix.language }}
          tier: ${{ matrix.tier }}
          otel_distro_name: ${{ matrix.otel_distro_name }}
        env:
          ODIGOS_TOKEN_SYNTHTIC_APPS_TESTS_CI: ${{ secrets.ODIGOS_TOKEN_SYNTHTIC_APPS_TESTS_CI }}
          DEPOT_SYNTHTIC_APPS_PULL_TOKEN: ${{ secrets.DEPOT_SYNTHTIC_APPS_PULL_TOKEN }}
