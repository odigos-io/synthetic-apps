name: Odigos Scenario E2E

on:
  workflow_dispatch:
    inputs:
      odigos_version:
        description: 'Odigos version to install (e.g. v1.29.2 or 1.30.0-pre2 or 1.31.0-rc1)'
        required: true
        type: string
      scenario:
        description: 'Scenario to test'
        required: true
        type: choice
        options:
          - tail-sampling
          - head-sampling-http
          - head-sampling-grpc
          - url-templatization
      languages:
        description: 'Comma-separated languages (nodejs, python, java)'
        required: true
        type: string
        default: nodejs
      tier:
        description: 'Odigos tier to install'
        required: true
        type: choice
        options:
          - enterprise
          - oss
        default: enterprise
      otel_distro_name:
        description: 'Optional otelDistroName override (e.g. java-enterprise)'
        required: false
        type: string
        default: ''

env:
  DEPOT_REGISTRY: p0xd21zf5r.registry.depot.dev

jobs:
  setup-matrix:
    runs-on: depot-ubuntu-latest
    outputs:
      languages: ${{ steps.set-matrix.outputs.languages }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          langs=$(echo "${{ inputs.languages }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "languages=${langs}" >> "$GITHUB_OUTPUT"

  scenario-e2e:
    needs: setup-matrix
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.setup-matrix.outputs.languages) }}
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/odigos-scenario-e2e
        with:
          odigos_version: ${{ inputs.odigos_version }}
          scenario: ${{ inputs.scenario }}
          languages: ${{ matrix.language }}
          tier: ${{ inputs.tier }}
          otel_distro_name: ${{ inputs.otel_distro_name }}
        env:
          ODIGOS_TOKEN_SYNTHTIC_APPS_TESTS_CI: ${{ secrets.ODIGOS_TOKEN_SYNTHTIC_APPS_TESTS_CI }}
          DEPOT_SYNTHTIC_APPS_PULL_TOKEN: ${{ secrets.DEPOT_SYNTHTIC_APPS_PULL_TOKEN }}
