# Same app as url-templatization; custom rules merged from three Actions (see rules-merge-actions.yaml).
kind: Deployment
apiVersion: apps/v1
metadata:
  name: url-templatization-rules-merge
  labels:
    app: url-templatization-rules-merge
    url-templatization-scenario: rules-merge
spec:
  selector:
    matchLabels:
      app: url-templatization-rules-merge
  template:
    metadata:
      labels:
        app: url-templatization-rules-merge
        url-templatization-scenario: rules-merge
    spec:
      containers:
        - name: url-templatization
          image: p0xd21zf5r.registry.depot.dev/synthetic-apps:nodejs-url-templatization
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SELF_HOST
              value: "127.0.0.1"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: url-templatization-rules-merge
spec:
  selector:
    app: url-templatization-rules-merge
  ports:
    - protocol: TCP
      port: 8080
