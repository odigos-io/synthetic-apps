apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  Server spans from pii-masking /echo/* after the curl job POSTs credit-card, email,
  JWT, and UUID payloads. PII Masking Action should replace sensitive values with
  category-specific tokens in http.request.payload, preserving the surrounding JSON key prefix.
serviceName: pii-masking
resourceAttributes:
  odigos.workload.kind: Deployment
  odigos.workload.name: pii-masking
  k8s.deployment.name: pii-masking
  k8s.namespace.name: nodejs-pii-masking
spans:
  - id: credit-card-visa-masked
    description: |
      POST /echo/credit-card — Visa number masked as "visa":"***CREDIT_CARD***"
    kind: server
    spanAttributes:
      http.target: /echo/credit-card
    spanAttributesContains:
      http.request.payload: '"visa":"***CREDIT_CARD***"'
    expected:
      minimum: 1
  - id: credit-card-mastercard-masked
    description: |
      POST /echo/credit-card — MasterCard number masked as "mastercard":"***CREDIT_CARD***"
    kind: server
    spanAttributes:
      http.target: /echo/credit-card
    spanAttributesContains:
      http.request.payload: '"mastercard":"***CREDIT_CARD***"'
    expected:
      minimum: 1
  - id: email-masked
    description: |
      POST /echo/email — email masked as "email":"***EMAIL***"
    kind: server
    spanAttributes:
      http.target: /echo/email
    spanAttributesContains:
      http.request.payload: '"email":"***EMAIL***"'
    expected:
      minimum: 1
  - id: jwt-masked
    description: |
      POST /echo/jwt — JWT masked as "token":"***JWT***"
    kind: server
    spanAttributes:
      http.target: /echo/jwt
    spanAttributesContains:
      http.request.payload: '"token":"***JWT***"'
    expected:
      minimum: 1
  - id: jwt-header-masked
    description: |
      POST /echo/jwt-header — JWT in collected x-jwt request header masked to ***JWT***
    kind: server
    spanAttributes:
      http.target: /echo/jwt-header
      # http.request.header.x_jwt: '***JWT***' need to assert attribute which is a list of strings
    expected:
      minimum: 1
  - id: uuid-masked
    description: |
      POST /echo/uuid — UUID masked as "id":"***UUID***"
    kind: server
    spanAttributes:
      http.target: /echo/uuid
    spanAttributesContains:
      http.request.payload: '"id":"***UUID***"'
    expected:
      minimum: 1
