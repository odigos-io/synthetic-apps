kind: Deployment
apiVersion: apps/v1
metadata:
  name: queued-rollout
  labels:
    app: queued-rollout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queued-rollout
  template:
    metadata:
      labels:
        app: queued-rollout
    spec:
      containers:
        - name: queued-rollout
          image: p0xd21zf5r.registry.depot.dev/synthetic-apps:nodejs-rollout
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
kind: Service
apiVersion: v1
metadata:
  name: queued-rollout
spec:
  selector:
    app: queued-rollout
  ports:
    - protocol: TCP
      port: 8080
