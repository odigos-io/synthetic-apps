kind: Deployment
apiVersion: apps/v1
metadata:
  name: no-pods
  labels:
    app: no-pods
spec:
  replicas: 0
  selector:
    matchLabels:
      app: no-pods
  template:
    metadata:
      labels:
        app: no-pods
    spec:
      containers:
        - name: no-pods
          image: p0xd21zf5r.registry.depot.dev/synthetic-apps:nodejs-rollout
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
kind: Service
apiVersion: v1
metadata:
  name: no-pods
spec:
  selector:
    app: no-pods
  ports:
    - protocol: TCP
      port: 8080
