apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: head-sampling-http
spec:
  description: |
    E2E tests for Odigos head sampling on HTTP route matching workloads.
    Prerequisites: a kind cluster with Odigos already installed at the version under test.
    Configure the language under test via --values (e.g. make test-head-sampling-http LANGUAGE=nodejs).
  skipDelete: true
  bindings:
    - name: tests_namespace
      value: (join('-', [$values.language, 'head-sampling']))
  steps:

    - name: Create Tests Namespace
      try:
        - script:
            workDir: ../../../
            env:
              - name: TESTS_NAMESPACE
                value: ($tests_namespace)
              - name: DEPOT_SYNTHTIC_APPS_PULL_TOKEN
                value: ($values.depot_pull_token)
            content: |
              make ensure-namespace NAMESPACE="$TESTS_NAMESPACE" DEPOT_SYNTHTIC_APPS_PULL_TOKEN="$DEPOT_SYNTHTIC_APPS_PULL_TOKEN"

    - name: Enable sampling dry run and disable tail sampling
      try:
        - apply:
            file: ./apply/odigos-sampling-dry-run-config.yaml

    - name: Install Simple Trace Db
      try:
        - apply:
            file: ../../../tests/common/apply/simple-trace-db-deployment.yaml
            template: true

    - name: Add Destination
      try:
        - apply:
            file: ./apply/simple-trace-db-destination.yaml
            template: true

    - name: deploy test application
      try:
        - script:
            timeout: 5m
            env:
              - name: LANGUAGE
                value: ($values.language)
              - name: DEPOT_SYNTHTIC_APPS_PULL_TOKEN
                value: ($values.depot_pull_token)
              - name: OTEL_DISTRO_NAME
                value: ($values.otel_distro_name)
            content: |
              #!/bin/bash
              set -euo pipefail

              app_dir="$(cd .. && pwd)/${LANGUAGE}"
              if [ ! -d "${app_dir}" ]; then
                echo "unknown language: ${LANGUAGE} (expected ${app_dir})"
                exit 1
              fi
              if [ ! -d "${app_dir}/deployments/http-server" ]; then
                echo "language ${LANGUAGE} does not support head-sampling-http (no deployments/http-server)"
                exit 1
              fi

              kubectl get namespace odigos-system >/dev/null
              echo "deploying head-sampling-http app from ${app_dir}"
              if [ -n "${OTEL_DISTRO_NAME:-}" ]; then
                echo "using otel distro override: ${OTEL_DISTRO_NAME}"
              fi
              cd "${app_dir}"
              if [ -n "${DEPOT_SYNTHTIC_APPS_PULL_TOKEN:-}" ]; then
                make apply OTEL_DISTRO_NAME="${OTEL_DISTRO_NAME:-}"
                make rollout
              else
                make deploy OTEL_DISTRO_NAME="${OTEL_DISTRO_NAME:-}"
              fi

    - name: apply data streams to sources
      try:
        - script:
            env:
              - name: TESTS_NAMESPACE
                value: ($tests_namespace)
            content: |
              ../../../tests/common/apply/apply-data-stream-to-sources.sh

    - name: wait for pods to be instrumented
      try:
        - script:
            timeout: 5m
            env:
              - name: TESTS_NAMESPACE
                value: ($tests_namespace)
            content: |
              export NAMESPACE="$TESTS_NAMESPACE"
              ../../../tests/common/assert/wait-for-pods-instrumented.sh
      catch:
        - script:
            env:
              - name: TESTS_NAMESPACE
                value: ($tests_namespace)
            content: |
              kubectl get pods -n "$TESTS_NAMESPACE" -o yaml
              kubectl get sources,instrumentationconfig -n "$TESTS_NAMESPACE"

    - name: wait for simple trace db
      try:
        - script:
            timeout: 2m
            env:
              - name: TRACE_NAMESPACE
                value: ($namespace)
            content: |
              #!/bin/bash
              set -euo pipefail
              kubectl wait --for=condition=available deployment/simple-trace-db -n "$TRACE_NAMESPACE" --timeout=120s

    - name: trigger traffic
      try:
        - script:
            timeout: 5m
            env:
              - name: LANGUAGE
                value: ($values.language)
            content: |
              #!/bin/bash
              set -euo pipefail

              app_dir="$(cd .. && pwd)/${LANGUAGE}"
              cd "${app_dir}"
              make trigger-http-server-curls

    - name: Assert expected spans
      try:
        - script:
            timeout: 2m
            env:
              - name: TRACE_NAMESPACE
                value: ($namespace)
            content: |
              #!/bin/bash
              set -euo pipefail
              deadline=$(($(date +%s) + 120))
              while true; do
                if ../../../tests/common/assert/simple_trace_db_span_query_runner.sh --dir ./queries/spans "$TRACE_NAMESPACE" simple-trace-db; then
                  exit 0
                fi
                if [[ $(date +%s) -ge deadline ]]; then
                  echo "span assertions did not pass within 2m" >&2
                  exit 1
                fi
                sleep 2
              done
      catch:
        - script:
            env:
              - name: TRACE_NAMESPACE
                value: ($namespace)
            content: |
              ../../../tests/common/assert/simple_trace_db_span_query_runner.sh --dir ./queries/spans --verbose "$TRACE_NAMESPACE" simple-trace-db
