apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  HTTP server spans on head-sampling-http-server after head-sampling-http-server-curls job
  (scenarios/head-sampling-http/<language>/deployments/http-server/curl-job.yaml).
  External curl calls produce server spans with odigos.sampling.* attrs (distinct from
  periodic http-client outbound spans which share routes but lack sampling attrs).
  Express reports templatized routes with :param segments in http.route.
  spanAttributesAny accepts legacy (http.status_code) or stable semconv (http.response.status_code).
serviceName: head-sampling-http-server
resourceAttributesEndsWith:
  k8s.namespace.name: "-head-sampling"
resourceAttributes:
  odigos.workload.kind: Deployment
  odigos.workload.name: head-sampling-http-server
  k8s.deployment.name: head-sampling-http-server
x-absent-tail-sampling-attrs: &absent_tail_sampling_attrs
  odigos.sampling.span.matching_rule.id: ""
  odigos.sampling.span.matching_rule.name: ""
  odigos.sampling.span.matching_rule.keep_percentage: ""
  odigos.sampling.trace.deciding_rule.name: ""
x-http-status-200: &http_status_200
  http.status_code: 200
  http.response.status_code: 200
spans:
  - id: exact-route
    description: call_many 20x GET /http-match/exact/target — http-match-exact-route (50% noise)
    samplingDecision: |
      http-match-exact-route matches exact literal path /http-match/exact/target (percentageAtMost 50%).
    kind: server
    spanAttributes:
      http.route: /http-match/exact/target
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAny: *http_status_200
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20

  - id: prefix-route-segment
    description: call_many 20x GET /http-match/prefix/segment — http-match-prefix-route (50%)
    samplingDecision: |
      http-match-prefix-route matches routePrefix /http-match/prefix (percentageAtMost 50%).
    kind: server
    spanAttributes:
      http.route: /http-match/prefix/segment
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAny: *http_status_200
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20

  - id: prefix-route-nested
    description: call_many 20x GET /http-match/prefix/segment/nested — http-match-prefix-route (50%)
    samplingDecision: |
      http-match-prefix-route matches deeper paths under /http-match/prefix (percentageAtMost 50%).
    kind: server
    spanAttributes:
      http.route: /http-match/prefix/segment/nested
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAny: *http_status_200
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20

  - id: templatized-exact
    description: call_many 20x GET /http-match/texact/res-42 — http-match-templatized-exact (50%)
    samplingDecision: |
      http-match-templatized-exact matches templated route /http-match/texact/* (percentageAtMost 50%).
      Express http.route is /http-match/texact/:resourceId.
    kind: server
    spanAttributes:
      http.route: /http-match/texact/:resourceId
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAny: *http_status_200
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20

  - id: templatized-prefix-items
    description: call_many 20x GET /http-match/tprefix/tenant-a/items — http-match-templatized-prefix (50%)
    samplingDecision: |
      http-match-templatized-prefix matches routePrefix /http-match/tprefix/*/items (percentageAtMost 50%).
      Express http.route is /http-match/tprefix/:tenantId/items.
    kind: server
    spanAttributes:
      http.route: /http-match/tprefix/:tenantId/items
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAny: *http_status_200
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20

  - id: templatized-prefix-items-nested
    description: call_many 20x GET /http-match/tprefix/tenant-b/items/item-7 — http-match-templatized-prefix (50%)
    samplingDecision: |
      http-match-templatized-prefix matches deeper paths under /http-match/tprefix/*/items (percentageAtMost 50%).
      Express http.route is /http-match/tprefix/:tenantId/items/:itemId.
    kind: server
    spanAttributes:
      http.route: /http-match/tprefix/:tenantId/items/:itemId
      odigos.sampling.category: noise
      odigos.sampling.dry_run: true
      odigos.sampling.trace.deciding_rule.keep_percentage: 50
    spanAttributesAny: *http_status_200
    spanAttributesAbsent: *absent_tail_sampling_attrs
    expected:
      count: 20
