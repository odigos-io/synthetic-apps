kind: Deployment
apiVersion: apps/v1
metadata:
  name: versionminimumlegacy
  labels:
    app: versionminimumlegacy
spec:
  selector:
    matchLabels:
      app: versionminimumlegacy
  template:
    metadata:
      labels:
        app: versionminimumlegacy
    spec:
      containers:
        - name: versionminimumlegacy
          image: p0xd21zf5r.registry.depot.dev/synthetic-apps:python-runtime-versions-versionminimumlegacy
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: versionminimumlegacy
spec:
  selector:
    app: versionminimumlegacy
  ports:
    - protocol: TCP
      port: 8080
