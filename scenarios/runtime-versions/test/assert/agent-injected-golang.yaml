apiVersion: v1
kind: Pod
metadata:
  (contains(keys(labels), 'odigos.io/agents-meta-hash')): true
  labels:
    app: versionlatest
  namespace: golang-runtime-versions
spec:
  containers:
    - name: versionlatest
      (env[?name == 'ODIGOS_WORKLOAD_NAMESPACE']):
        - value: golang-runtime-versions
status:
  containerStatuses:
    - name: versionlatest
      started: true
      ready: true
      restartCount: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: versionlatest
  namespace: golang-runtime-versions
status:
  observedGeneration: 2
  replicas: 1
  updatedReplicas: 1
  readyReplicas: 1
  availableReplicas: 1
---
apiVersion: odigos.io/v1alpha1
kind: InstrumentationInstance
metadata:
  namespace: golang-runtime-versions
  labels:
    instrumented-app: deployment-versionlatest
status:
  healthy: true
---
