apiVersion: e2e.tests.odigos.io/v1
kind: SpanBatchTest
description: |
  Spans from supported Node.js runtime versions in nodejs-runtime-versions
  after generate-traffic job (scenarios/runtime-versions/test/apply/generate-traffic-nodejs.yaml).
serviceName: versionlatest
resourceAttributes:
  k8s.namespace.name: nodejs-runtime-versions
spans:
  - id: versionlatest
    description: GET /static/success on versionlatest deployment (supported runtime)
    kind: server
    spanAttributes:
      http.route: /static/success
    expected:
      minimum: 1

  - id: versionminimum
    description: GET /static/success on versionminimum deployment (supported runtime)
    serviceName: versionminimum
    kind: server
    spanAttributes:
      http.route: /static/success
    expected:
      minimum: 1
