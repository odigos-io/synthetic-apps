kind: Deployment
apiVersion: apps/v1
metadata:
  name: custom-instrumentation
  labels:
    app: custom-instrumentation
spec:
  selector:
    matchLabels:
      app: custom-instrumentation
  template:
    metadata:
      labels:
        app: custom-instrumentation
    spec:
      containers:
        - name: custom-instrumentation
          image: ghcr.io/odigos-io/synthetic-apps/golang-custom-instrumentation:custom-instrumentation
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
kind: Service
apiVersion: v1
metadata:
  name: custom-instrumentation
spec:
  selector:
    app: custom-instrumentation
  ports:
    - protocol: TCP
      port: 8080
