kind: Deployment
apiVersion: apps/v1
metadata:
  name: ml-head-sampling-go
  labels:
    app: ml-head-sampling-go
spec:
  selector:
    matchLabels:
      app: ml-head-sampling-go
  template:
    metadata:
      labels:
        app: ml-head-sampling-go
    spec:
      containers:
        - name: ml-head-sampling-go
          image: ghcr.io/odigos-io/synthetic-apps/multi-language-head-sampling-go:head-sampling
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            periodSeconds: 10
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: ml-head-sampling-go
spec:
  selector:
    app: ml-head-sampling-go
  ports:
    - protocol: TCP
      port: 9090
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ml-head-sampling-nodejs
  labels:
    app: ml-head-sampling-nodejs
spec:
  selector:
    matchLabels:
      app: ml-head-sampling-nodejs
  template:
    metadata:
      labels:
        app: ml-head-sampling-nodejs
    spec:
      containers:
        - name: ml-head-sampling-nodejs
          image: ghcr.io/odigos-io/synthetic-apps/multi-language-head-sampling-nodejs:head-sampling
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: ml-head-sampling-nodejs
spec:
  selector:
    app: ml-head-sampling-nodejs
  ports:
    - protocol: TCP
      port: 8080

