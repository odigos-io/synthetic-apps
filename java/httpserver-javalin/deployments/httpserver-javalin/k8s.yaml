kind: Deployment
apiVersion: apps/v1
metadata:
  name: httpserver-javalin
  labels:
    app: httpserver-javalin
spec:
  selector:
    matchLabels:
      app: httpserver-javalin
  template:
    metadata:
      labels:
        app: httpserver-javalin
    spec:
      containers:
        - name: httpserver-javalin
          image: ghcr.io/odigos-io/synthetic-apps/java-httpserver-javalin:httpserver-javalin
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: httpserver-javalin
spec:
  selector:
    app: httpserver-javalin
  ports:
    - protocol: TCP
      port: 8080
