kind: Deployment
apiVersion: apps/v1
metadata:
  name: head-sampling-http-matching
  labels:
    app: head-sampling-http-matching
spec:
  selector:
    matchLabels:
      app: head-sampling-http-matching
  template:
    metadata:
      labels:
        app: head-sampling-http-matching
    spec:
      containers:
        - name: head-sampling-http-matching
          image: ghcr.io/odigos-io/synthetic-apps/java-head-sampling:head-sampling
          imagePullPolicy: IfNotPresent
          env:
            - name: HTTP_MATCH_PERIODIC_OUTBOUND
              value: "true"
            - name: HTTP_MATCH_PEER_BASE_URL
              value: "http://127.0.0.1:8080"
            # Exact-route outbound only: use cluster DNS so server.address is the Service name.
            - name: HTTP_MATCH_EXACT_PEER_BASE_URL
              value: "http://head-sampling-http-matching:8080"
            - name: HTTP_MATCH_OUTBOUND_INTERVAL_MS
              value: "10000"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: head-sampling-http-matching
spec:
  selector:
    app: head-sampling-http-matching
  ports:
    - protocol: TCP
      port: 8080
