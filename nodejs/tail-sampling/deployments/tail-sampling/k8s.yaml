kind: Deployment
apiVersion: apps/v1
metadata:
  name: tail-sampling
  labels:
    app: tail-sampling
spec:
  selector:
    matchLabels:
      app: tail-sampling
  template:
    metadata:
      labels:
        app: tail-sampling
    spec:
      containers:
        - name: tail-sampling
          image: ghcr.io/odigos-io/synthetic-apps/nodejs-tail-sampling:tail-sampling
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
kind: Service
apiVersion: v1
metadata:
  name: tail-sampling
spec:
  selector:
    app: tail-sampling
  ports:
    - protocol: TCP
      port: 8080
