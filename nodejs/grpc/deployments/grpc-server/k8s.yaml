kind: Deployment
apiVersion: apps/v1
metadata:
  name: grpc-server
  labels:
    app: grpc-server
spec:
  selector:
    matchLabels:
      app: grpc-server
  template:
    metadata:
      labels:
        app: grpc-server
    spec:
      containers:
        - name: grpc-server
          image: p0xd21zf5r.registry.depot.dev/synthetic-apps:nodejs-grpc
          imagePullPolicy: IfNotPresent
          env:
            - name: GRPC_ENABLE_SERVER
              value: "true"
            - name: GRPC_ENABLE_CLIENT
              value: "false"
            - name: GRPC_ENABLE_RELAY
              value: "false"
            - name: GRPC_PORT
              value: "50051"
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: grpc-server
spec:
  selector:
    app: grpc-server
  ports:
    - name: http
      protocol: TCP
      port: 8080
    - name: grpc
      protocol: TCP
      port: 50051
