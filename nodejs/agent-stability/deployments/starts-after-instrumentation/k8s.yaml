# Stays healthy when ODIGOS_DISTRO_NAME is injected after instrumentation.
kind: Deployment
apiVersion: apps/v1
metadata:
  name: starts-after-instrumentation
  labels:
    app: starts-after-instrumentation
    agent-stability-scenario: starts-after-instrumentation
spec:
  selector:
    matchLabels:
      app: starts-after-instrumentation
  template:
    metadata:
      labels:
        app: starts-after-instrumentation
        agent-stability-scenario: starts-after-instrumentation
    spec:
      containers:
        - name: app
          image: ghcr.io/odigos-io/synthetic-apps/nodejs-agent-stability:agent-stability
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SCENARIO
              value: starts-after-instrumentation
            - name: CONTAINER_NAME
              value: app
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
---
kind: Service
apiVersion: v1
metadata:
  name: starts-after-instrumentation
spec:
  selector:
    app: starts-after-instrumentation
  ports:
    - protocol: TCP
      port: 8080
