kind: Deployment
apiVersion: apps/v1
metadata:
  name: localstack
  labels:
    app: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:4.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: "sns,sqs"
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
---
kind: Service
apiVersion: v1
metadata:
  name: localstack
spec:
  selector:
    app: localstack
  ports:
    - protocol: TCP
      port: 4566
---
kind: Job
apiVersion: batch/v1
metadata:
  name: localstack-init
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: amazon/aws-cli:2.27.28
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          command:
            - /bin/sh
            - -c
            - |
              until aws --endpoint-url=http://localstack:4566 sqs list-queues 2>/dev/null; do
                echo "Waiting for LocalStack..."
                sleep 2
              done
              aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sqs-direct-queue
              aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sns-forwarded-queue
              aws --endpoint-url=http://localstack:4566 sns create-topic --name sns-sqs-topic
              aws --endpoint-url=http://localstack:4566 sns subscribe \
                --topic-arn arn:aws:sns:us-east-1:000000000000:sns-sqs-topic \
                --protocol sqs \
                --notification-endpoint arn:aws:sqs:us-east-1:000000000000:sns-forwarded-queue
              echo "LocalStack init complete: 2 SQS queues created, SNS topic subscribed to sns-forwarded-queue"
