kind: Deployment
apiVersion: apps/v1
metadata:
  name: aws-sns-sqs
  labels:
    app: aws-sns-sqs
spec:
  selector:
    matchLabels:
      app: aws-sns-sqs
  template:
    metadata:
      labels:
        app: aws-sns-sqs
    spec:
      containers:
        - name: aws-sns-sqs
          image: ghcr.io/odigos-io/synthetic-apps/nodejs-aws-sns-sqs:aws-sns-sqs
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AWS_ENDPOINT
              value: "http://localstack:4566"
            - name: AWS_REGION
              value: "us-east-1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: aws-sns-sqs
spec:
  selector:
    app: aws-sns-sqs
  ports:
    - protocol: TCP
      port: 8080
