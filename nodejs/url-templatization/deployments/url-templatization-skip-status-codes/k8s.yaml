# Two Actions apply overlapping skipPolicy.skipHttpStatusCodes on this Deployment (401/404 vs 400/404).
kind: Deployment
apiVersion: apps/v1
metadata:
  name: url-templatization-skip-status-codes
  labels:
    app: url-templatization-skip-status-codes
    url-templatization-scenario: skip-status-codes
spec:
  selector:
    matchLabels:
      app: url-templatization-skip-status-codes
  template:
    metadata:
      labels:
        app: url-templatization-skip-status-codes
        url-templatization-scenario: skip-status-codes
    spec:
      containers:
        - name: url-templatization
          image: ghcr.io/odigos-io/synthetic-apps/nodejs-url-templatization:url-templatization
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SELF_HOST
              value: "127.0.0.1"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: url-templatization-skip-status-codes
spec:
  selector:
    app: url-templatization-skip-status-codes
  ports:
    - protocol: TCP
      port: 8080
