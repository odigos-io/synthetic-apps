# Three Actions scoped to url-templatization-multi-rules to test conflict resolution.
# Apply with: kubectl apply -n odigos-system -f deployments/url-templatization-multi-rules/multi-rules-actions.yaml
#
# Expected: disable wins over enable; skipForNonSuccessCodes from the third Action is ignored.
---
apiVersion: odigos.io/v1alpha1
kind: Action
metadata:
  name: nodejs-url-templatization-multi-rules-enable
  namespace: odigos-system
spec:
  actionName: nodejs-url-templatization-multi-rules-enable
  notes: >-
    Rule 1/3 for url-templatization-multi-rules: empty defaultTemplatization (enable default).
  signals:
    - TRACES
  urlTemplatization:
    templatizationRulesGroups: []
    defaultTemplatization:
      - sourcesScopes:
          sources:
            - kind: Deployment
              name: url-templatization-multi-rules
              namespace: nodejs-url-templatization
          languages:
            - javascript
        defaultTemplatization: {}
---
apiVersion: odigos.io/v1alpha1
kind: Action
metadata:
  name: nodejs-url-templatization-multi-rules-disable
  namespace: odigos-system
spec:
  actionName: nodejs-url-templatization-multi-rules-disable
  notes: >-
    Rule 2/3 for url-templatization-multi-rules: enabled=true disables default templatization.
    Should win over the enable Action when both target this deployment.
  signals:
    - TRACES
  urlTemplatization:
    templatizationRulesGroups: []
    defaultTemplatization:
      - sourcesScopes:
          sources:
            - kind: Deployment
              name: url-templatization-multi-rules
              namespace: nodejs-url-templatization
          languages:
            - javascript
        defaultTemplatization:
          enabled: true
---
apiVersion: odigos.io/v1alpha1
kind: Action
metadata:
  name: nodejs-url-templatization-multi-rules-skip-non-success
  namespace: odigos-system
spec:
  actionName: nodejs-url-templatization-multi-rules-skip-non-success
  notes: >-
    Rule 3/3 for url-templatization-multi-rules: skip default templatization on non-2xx spans.
    Expected to be ignored when conflicting with disable/enable Actions on the same deployment.
    Hit /default/errors/404 and /default/errors/500 to exercise non-success paths.
  signals:
    - TRACES
  urlTemplatization:
    templatizationRulesGroups: []
    defaultTemplatization:
      - sourcesScopes:
          sources:
            - kind: Deployment
              name: url-templatization-multi-rules
              namespace: nodejs-url-templatization
          languages:
            - javascript
        defaultTemplatization:
          skipOnError:
            skipForNonSuccessCodes: true
