# Liveness always succeeds; readiness always fails. Tight readiness probe timing
# so the pod is marked NotReady almost immediately (no container restarts).
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ready-fail-probe-fast
  labels:
    app: ready-fail-probe-fast
    k8s-health-scenario: ready-fail-probe-fast
spec:
  selector:
    matchLabels:
      app: ready-fail-probe-fast
  template:
    metadata:
      labels:
        app: ready-fail-probe-fast
        k8s-health-scenario: ready-fail-probe-fast
    spec:
      containers:
        - name: k8s-health
          image: ghcr.io/odigos-io/synthetic-apps/nodejs-k8s-health:k8s-health
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SCENARIO
              value: live-ok-ready-fail
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 1
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: ready-fail-probe-fast
spec:
  selector:
    app: ready-fail-probe-fast
  ports:
    - protocol: TCP
      port: 8080
