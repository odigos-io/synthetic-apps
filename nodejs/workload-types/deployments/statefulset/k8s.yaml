kind: Service
apiVersion: v1
metadata:
  name: workload-types-statefulset
  labels:
    app: workload-types-statefulset
    workload-type: statefulset
spec:
  clusterIP: None
  selector:
    app: workload-types-statefulset
  ports:
    - name: http
      port: 8080
---
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: workload-types-statefulset
  labels:
    app: workload-types-statefulset
    workload-type: statefulset
spec:
  serviceName: workload-types-statefulset
  replicas: 2
  selector:
    matchLabels:
      app: workload-types-statefulset
  template:
    metadata:
      labels:
        app: workload-types-statefulset
        workload-type: statefulset
    spec:
      containers:
        - name: workload-types
          image: ghcr.io/odigos-io/synthetic-apps/nodejs-workload-types:workload-types
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: WORKLOAD_KIND
              value: StatefulSet
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 5
