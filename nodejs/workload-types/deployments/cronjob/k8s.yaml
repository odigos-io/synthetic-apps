kind: CronJob
apiVersion: batch/v1
metadata:
  name: workload-types-cronjob
  labels:
    app: workload-types-cronjob
    workload-type: cronjob
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: workload-types-cronjob
        workload-type: cronjob
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: workload-types-cronjob
            workload-type: cronjob
        spec:
          restartPolicy: OnFailure
          containers:
            - name: workload-types
              image: ghcr.io/odigos-io/synthetic-apps/nodejs-workload-types:workload-types
              imagePullPolicy: IfNotPresent
              env:
                - name: WORKLOAD_KIND
                  value: CronJob
                - name: CRON_JOB
                  value: "true"
                - name: CRON_RUN_DURATION_MS
                  value: "50000"
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
