kind: Deployment
apiVersion: apps/v1
metadata:
  name: head-sampling
  labels:
    app: head-sampling
spec:
  selector:
    matchLabels:
      app: head-sampling
  template:
    metadata:
      labels:
        app: head-sampling
    spec:
      containers:
        - name: head-sampling
          image: ghcr.io/odigos-io/synthetic-apps/nodejs-head-sampling:head-sampling
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8080
            periodSeconds: 1
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            periodSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
---
kind: Service
apiVersion: v1
metadata:
  name: head-sampling
spec:
  selector:
    app: head-sampling
  ports:
    - protocol: TCP
      port: 8080
